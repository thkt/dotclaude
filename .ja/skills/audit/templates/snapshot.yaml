# Audit スナップショット スキーマ（canonical — ADR 0047 準拠）
#
# 保存先: $HOME/.claude/workspace/history/audit-YYYY-MM-DD-HHmmss.yaml
#
# このファイルが audit 実行の canonical source。output.md はこのファイルから
# render される view — snapshot に遡れないフィールドは output に書かない。
#
# プレースホルダ規約: `N` は埋める整数、`#` 以降はコメントで期待値や enum を説明。
# 整列は意図的にしない — 値とインラインコメントは 1 スペースで区切る。

session_id: # UUID（必須）
timestamp: # ISO 8601（必須）
branch: # audit 実行時の git ブランチ
target: # 監査対象スコープ — ファイル、SHA 範囲、または記述
focus: # security | performance | readability | all

pre_flight:
  tests: { total: N, pass: N, fail: N, ignored: N } # テストランナー出力; ランナーなしなら省略
  build: # pass | fail | skipped
  clippy: # "clean" | "N warnings" | skipped # Rust のみ; 他言語は省略
  fmt: # "clean" | "N drifts" | skipped # フォーマッタ出力
  coverage: # skipped  または  { c0: "N%", c1: "N%" }

findings:
  # 各 finding は個別にアドレス可能。prefix 一覧は references/finding-schema.md
  # の ID Prefix Registry が canonical。RC は Wave 1 root-cause-reviewer 出力と
  # integrator synthesis の両方をカバー。RC エントリの `resolves` 配列（optional）
  # に統合元 finding の ID を列挙する。
  - id: # <PREFIX>-<NNN>、prefix 別 1-based 連番（詳細は finding-schema.md 参照）
    severity: # critical | high | medium | low
    category: # 自由記述（例: "structure/size", "logging/format"）
    file: # repo 相対パス+行番号（例: "src/main.rs:42", "src/lib.rs:10-24"）
    message: # 具体問題を含む 1 行記述
    status: # 以下 5 値のいずれか
      # open          = Wave 1 raw、照合前
      # confirmed     = 照合済み、エビデンス十分
      # dismissed     = challenger 棄却（false positive）
      # needs_review  = challenger が disputed、verifier が verified → 人間判断要
      # needs_context = weak evidence + budget exhausted
    # Optional フィールド（該当時のみ記入）
    resolves: [] # RC エントリ専用: この synthesis が統合した finding の ID 配列
    effort: # "5min" | "15min" | "30min" | "1h" | "manual" — RC および auto-fix 候補で使用
    fix_type: # "auto" | "manual" — 既知の修正パターンを曖昧さなく適用可能なら "auto"

summary:
  total_findings: N
  critical: N # 0 なら行ごと省略
  high: N
  medium: N
  low: N
  dismissed: N # challenger が棄却した false positive 件数
  trust_score: N # 0-100、ADR 0035 準拠

pipeline_health:
  reviewers_completed: N # 完了した reviewer agent 数
  root_cause_completed: true|false
  challenger_completed: true|false
  verifier_completed: true|false
  integrator_completed: true|false
  domains_skipped: [] # "<domain>: <reason>" 文字列のリスト

delta_from: # 前回 snapshot ファイル名（例: "audit-2026-04-15-141951.yaml"）、初回は null
delta:
  tests: # "N → N" または "unchanged"
  clippy: # "N warnings → 0" または "unchanged"
  fmt: # "N drifts → 0" または "unchanged"
  trust_score: # "N → N" または "unchanged"
  critical: # "+N", "-N", "0", 初回は "(first)"
  high: # critical と同形式
  medium: # critical と同形式
  low: # critical と同形式
  findings_new: N # 今回 run で新出した findings 数
  findings_resolved: N # 前回存在、今回 run で解消した findings 数
  findings_prior: N # 前回 total、初回は null
