# Audit Snapshot Schema
#
# Location: $HOME/.claude/workspace/history/audit-YYYY-MM-DD-HHmmss.yaml

meta:
  command: audit
  timestamp: # ISO 8601
  target: # target scope

summary:
  total_findings: # count
  root_causes_synthesized: # count
  standalone_findings: # count
  by_severity:
    critical: # count
    high: # count
    medium: # count
    low: # count
  validation:
    challenged: # count
    confirmed: # count
    disputed: # count
    downgraded: # count
    needs_context: # count
    needs_review: # count (disputed × verified)
    false_positive_rate: # percentage
    verification:
      verified: # count
      weak_evidence: # count
      unverifiable: # count
      verification_rate: # percentage

root_causes:
  - id: "RC-001"
    description: # one sentence: the real problem
    category: # architecture_gap|knowledge_gap|tooling_gap|process_gap
    findings_resolved: # [finding IDs]
    domains_involved: # [domain names]
    five_whys:
      - why: # question
        answer: # answer
    confidence: # float 0.70-1.00
    action:
      description: # unified fix
      effort: # 5min|15min|30min|1h|manual
      resolves_count: # count

priorities:
  - priority: # critical|high|medium|low
    root_cause_ref: # RC-001 or finding_ref for standalone
    item: # description
    score: # numeric score
    action: # recommended action
    timing: # immediate|this_sprint|next_sprint|backlog

suggestions:
  auto_fixable_count: # count
  manual_count: # count
  items:
    - id: "SUG-001"
      root_cause_ref: # RC-001 or finding_ref for standalone
      category: # category
      severity: # critical|high|medium|low
      fix_type: # pattern|codemod|lint-fix|manual
      confidence: # 0.85-1.00
      location:
        file: # file path
        line: # line number
      before: # original code snippet
      after: # suggested fix snippet
      rationale: # why this fix — traces to root cause
      effort: # 5min|15min|30min|1h|manual
