# Canonical Finding Schema
#
# Base fields required from all audit sub-reviewers.
# Leader (Medium tier) or Integrator (Large tier) normalizes
# domain-specific extensions during integration.

# --- Base fields (required) ---
finding:
  finding_id: "{PREFIX}-{seq}"  # See ID prefix registry below
  agent: "<reviewer-name>"
  severity: critical|high|medium|low
  category: "<domain-specific category>"
  location: "<file>:<line>"
  evidence: "<code snippet or observation>"
  reasoning: "<why this is an issue>"
  fix: "<suggested fix>"
  confidence: 0.60-1.00
  confidence_floor: 0.60
  verification_hint:
    check: execution_trace|call_site_check|error_propagation|hotpath_analysis|pattern_search
    question: "<what to verify>"

# --- Domain-specific extensions (normalized during integration) ---
#
# | Reviewer               | Extra Fields              | Normalization                                          |
# | ---------------------- | ------------------------- | ------------------------------------------------------ |
# | root-cause-reviewer    | five_whys, root_cause     | root_cause → reasoning; five_whys → append to evidence |
# | progressive-enhancer   | recommendations           | Append as separate items                               |
# | code-quality-reviewer  | subcategory               | Append to category as category/subcategory             |
# | performance-reviewer   | impact                    | Append to evidence; impact → reasoning note            |
# | accessibility-reviewer | wcag                      | Append to evidence                                     |
# | test-coverage-reviewer | related_code, criticality | related_code → evidence; criticality → reasoning note  |
# | type-design-reviewer   | type_name, scores         | Append to evidence; scores → reasoning note            |
# | security-reviewer      | entry_points (in hint)    | Already in verification_hint                           |

# --- ID prefix registry ---
# | Prefix | Reviewer                |
# | ------ | ----------------------- |
# | SEC    | security-reviewer       |
# | SF     | silent-failure-reviewer |
# | TS     | type-safety-reviewer    |
# | TD     | type-design-reviewer    |
# | CQ     | code-quality-reviewer   |
# | PE     | progressive-enhancer    |
# | RCA    | root-cause-reviewer     |
# | DP     | design-pattern-reviewer |
# | TEST   | testability-reviewer    |
# | TC     | test-coverage-reviewer  |
# | PERF   | performance-reviewer    |
# | A11Y   | accessibility-reviewer  |
# | DOC    | document-reviewer       |
