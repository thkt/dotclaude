# ============================================================================
# SKILL FRONTMATTER TEMPLATE
# ============================================================================
#
# Usage:
#   1. Copy this template to ~/.claude/skills/<skill-name>/SKILL.md
#   2. Uncomment and fill in required fields
#   3. Optionally enable 2.1.0 features as needed
#
# ============================================================================

---
# ============ Required Fields ============
name: skill-name # kebab-case, unique identifier
description: >
  Brief description in English.
  Triggers: keyword1, keyword2, キーワード1, キーワード2

# ============ Tools ============
# Use YAML list format (2.1.0 feature)
allowed-tools:
  - Read
  - Grep
  - Glob
  # Add as needed:
  # - Write
  # - Edit
  # - Task
  # - Bash


# ============ 2.1.0 New Features ============

# --- context: fork ---
# Runs skill in isolated sub-agent context
# Use for: Long-running tasks, large file reads, memory-intensive operations
# Recommended categories: documenting-*, analyzing-*, generating-*, automating-*
#
# context: fork

# --- agent: <agent-name> ---
# Specifies which agent should execute this skill
# Use for: Skills that should leverage specialized agent capabilities
# Recommended categories: reviewing-* → corresponding reviewer
#
# agent: agent-name

# --- model: haiku|sonnet|opus ---
# Override default model for this skill
# Use for: Cost/speed optimization or when higher capability needed
#
# model: haiku

# ============ Hooks (2.1.0) ============
# Define skill-specific lifecycle hooks
# Prefer global hooks in settings.json for consistency
#
# hooks:
#   PreToolUse:
#     - matcher: "Write|Edit"
#       command: "echo 'Pre-write hook for skill'"
#       once: true                  # Optional: run only once per session
#   PostToolUse:
#     - matcher: "Bash"
#       command: "echo 'Post-bash hook'"
#   Stop:
#     - command: "echo 'Skill execution completed'"

# ============ Metadata ============
# user-invocable: true              # Show in slash command menu (default)
# user-invocable: false             # Hide from slash command menu

---
# Skill content starts here...
#
# Recommended structure:
# 1. One-line target/goal
# 2. Quick reference table
# 3. Section-based loading (if applicable)
# 4. Checklist
# 5. Key principles
# 6. References
