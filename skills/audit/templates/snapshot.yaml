# Audit Snapshot Schema (canonical — per ADR 0047)
#
# Location: $HOME/.claude/workspace/history/audit-YYYY-MM-DD-HHmmss.yaml
#
# This file is the canonical source of an audit run. output.md is a rendered
# view derived from this file — do not render output fields that cannot be
# traced back to snapshot data.
#
# Placeholder convention: `N` = integer to fill, comment after `#` explains
# the expected value or enum. Alignment is intentionally not maintained;
# single space separates value from inline comment.

session_id: # UUID (required)
timestamp: # ISO 8601 (required)
branch: # git branch at audit time
target: # audited scope — files, SHA range, or description
focus: # security | performance | readability | all

pre_flight:
  tests: { total: N, pass: N, fail: N, ignored: N } # from test runner; omit if no runner
  build: # pass | fail | skipped
  clippy: # "clean" | "N warnings" | skipped # Rust only; omit for other languages
  fmt: # "clean" | "N drifts" | skipped # format checker output
  coverage: # skipped  OR  { c0: "N%", c1: "N%" }

findings:
  # Each finding is individually addressable. Prefix registry lives in
  # references/finding-schema.md (canonical). RC covers both Wave 1
  # root-cause-reviewer output and integrator synthesis; optional `resolves`
  # array on RC entries lists the findings it unifies.
  - id: # <PREFIX>-<NNN>, 1-based sequential per prefix (see finding-schema.md)
    severity: # critical | high | medium | low
    category: # free-form descriptor (e.g. "structure/size", "logging/format")
    file: # repo-relative path with line (e.g. "src/main.rs:42", "src/lib.rs:10-24")
    message: # one-line description of the concrete issue
    status: # one of the five values below
      # open          = Wave 1 raw, not yet reconciled
      # confirmed     = reconciled, evidence supports keeping
      # dismissed     = challenger rejected (false positive)
      # needs_review  = disputed by challenger but verified by verifier → human judgement
      # needs_context = weak evidence + budget exhausted
    # Optional fields (write when applicable)
    resolves: [] # RC entries only: IDs of findings this synthesis unifies
    effort: # "5min" | "15min" | "30min" | "1h" | "manual" — for RC and auto-fix candidates
    fix_type: # "auto" | "manual" — "auto" when a known fix pattern applies without ambiguity

summary:
  total_findings: N
  critical: N # omit this row if 0
  high: N
  medium: N
  low: N
  dismissed: N # findings dismissed by challenger (false positive pruning)
  trust_score: N # 0-100, per ADR 0035

pipeline_health:
  reviewers_completed: N # count of completed reviewer agents
  root_cause_completed: true|false
  challenger_completed: true|false
  verifier_completed: true|false
  integrator_completed: true|false
  domains_skipped: [] # list of "<domain>: <reason>" strings

delta_from: # previous snapshot filename (e.g. "audit-2026-04-15-141951.yaml") or null on first run
delta:
  tests: # "N → N" or "unchanged"
  clippy: # "N warnings → 0" or "unchanged"
  fmt: # "N drifts → 0" or "unchanged"
  trust_score: # "N → N" or "unchanged"
  critical: # "+N", "-N", "0", or "(first)" on first run
  high: # same format as critical
  medium: # same format as critical
  low: # same format as critical
  findings_new: N # findings present in this run, absent in previous
  findings_resolved: N # findings present in previous, absent in this run
  findings_prior: N # prior total, or null if first run
